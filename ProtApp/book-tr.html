<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProtApp — Kitap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Inter:wght@400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', Georgia, serif;
            overflow: hidden;
            user-select: none;
        }

        /* ── Book wrapper ───────────────────────── */
        .book-scene {
            perspective: 3000px;
            width: 95vw;
            max-width: 1400px;
            height: calc(100vh - 120px);
            max-height: 850px;
            position: relative;
        }

        .book {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
        }

        /* ── Paper texture ──────────────────────── */
        .paper {
            background-color: #ffffff;
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.03);
            /* Soft inner shadow for depth */
        }

        /* ── Left & Right halves (static) ──────── */
        .half {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            overflow: hidden;
            /* Realistic stacked paper edges */
            border-top: 3px solid #f8fafc;
            border-bottom: 4px solid #f1f5f9;
        }

        .half-left {
            left: 0;
            border-radius: 16px 4px 4px 16px;
            box-shadow: -15px 15px 30px rgba(0, 0, 0, 0.25), inset 2px 0 10px rgba(0, 0, 0, 0.05);
            /* deep shadow, inner folded edge */
            border-left: 4px solid #e2e8f0;
        }

        .half-right {
            left: 50%;
            border-radius: 4px 16px 16px 4px;
            box-shadow: 15px 15px 30px rgba(0, 0, 0, 0.25), inset -2px 0 10px rgba(0, 0, 0, 0.05);
            border-right: 4px solid #e2e8f0;
        }

        /* Inner spine shadows */
        .half-left::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 55px;
            /* Wider, softer spine fold */
            height: 100%;
            background: linear-gradient(to left, rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.05) 50%, transparent);
            pointer-events: none;
            z-index: 2;
        }

        .half-right::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 55px;
            height: 100%;
            background: linear-gradient(to right, rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.05) 50%, transparent);
            pointer-events: none;
            z-index: 2;
        }

        /* ── Flip page (the turning sheet) ──────── */
        .flip-page {
            position: absolute;
            top: 0;
            left: 50%;
            width: 50%;
            height: 100%;
            transform-origin: left center;
            transform-style: preserve-3d;
            z-index: 10;
            pointer-events: none;
        }

        .flip-page.flipping-forward {
            animation: flipForward 0.7s cubic-bezier(0.645, 0.045, 0.355, 1.000) forwards;
        }

        .flip-page.flipping-backward {
            animation: flipBackward 0.7s cubic-bezier(0.645, 0.045, 0.355, 1.000) forwards;
        }

        @keyframes flipForward {
            0% {
                transform: rotateY(0deg);
            }

            100% {
                transform: rotateY(-180deg);
            }
        }

        @keyframes flipBackward {
            0% {
                transform: rotateY(-180deg);
            }

            100% {
                transform: rotateY(0deg);
            }
        }

        .flip-front,
        .flip-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            overflow: hidden;
        }

        .flip-front {
            border-radius: 4px 16px 16px 4px;
            /* Right page */
            z-index: 1;
            /* Realism on turning page */
            border-top: 3px solid #f8fafc;
            border-bottom: 4px solid #f1f5f9;
            border-right: 4px solid #e2e8f0;
        }

        .flip-front::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            /* Left side of the Right page is the spine */
            width: 55px;
            height: 100%;
            background: linear-gradient(to right, rgba(0, 0, 0, 0.15), transparent);
            pointer-events: none;
        }

        .flip-back {
            transform: rotateY(180deg);
            border-radius: 16px 4px 4px 16px;
            /* Back of Right page is Left page */
            border-top: 3px solid #f8fafc;
            border-bottom: 4px solid #f1f5f9;
            border-left: 4px solid #e2e8f0;
        }

        .flip-back::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            /* Right side of the Left page is the spine */
            width: 55px;
            height: 100%;
            background: linear-gradient(to left, rgba(0, 0, 0, 0.15), transparent);
            pointer-events: none;
        }

        /* ── Center spine ───────────────────────── */
        .spine {
            position: absolute;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
            width: 32px;
            /* Thicker, deeper spine */
            height: 100%;
            background: linear-gradient(to right,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(0, 0, 0, 0.08) 10%,
                    rgba(0, 0, 0, 0.25) 50%,
                    rgba(0, 0, 0, 0.08) 90%,
                    rgba(255, 255, 255, 0) 100%);
            z-index: 20;
            pointer-events: none;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.1);
        }

        /* ── Book shadow ────────────────────────── */
        .book-shadow {
            position: absolute;
            bottom: -20px;
            left: 5%;
            right: 5%;
            height: 35px;
            background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.4) 0%, transparent 75%);
            z-index: -1;
            border-radius: 50%;
        }

        /* ── Controls ───────────────────────────── */
        .controls {
            margin-top: 50px;
            display: flex;
            gap: 15px;
            align-items: center;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            padding: 10px 24px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08), 0 1px 3px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(226, 232, 240, 0.9);
            z-index: 10;
        }

        .controls button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            color: #3b82f6;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .controls button:hover:not(:disabled) {
            background: #3b82f6;
            color: #ffffff;
            border-color: #3b82f6;
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .controls button:active:not(:disabled) {
            transform: scale(0.95);
        }

        .controls button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #f8fafc;
            color: #cbd5e1;
        }

        #pageCounter {
            color: #1e293b;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.5px;
            min-width: 90px;
            text-align: center;
        }

        /* ── Content typography ──────────────────── */
        .pg {
            padding: 40px 45px;
            height: 100%;
            overflow-y: hidden;
            color: #1e293b;
        }

        .pg::-webkit-scrollbar {
            width: 3px;
        }

        .pg::-webkit-scrollbar-track {
            background: transparent;
        }

        .pg::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .ch-label {
            text-align: center;
            font-style: italic;
            color: #94a3b8;
            font-size: 11px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            margin-bottom: 14px;
            padding-top: 18px;
        }

        .pg h2 {
            font-size: 20px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .pg p {
            font-size: 13px;
            line-height: 1.75;
            text-align: justify;
            margin-bottom: 9px;
            color: #334155;
        }

        .pull-q {
            text-align: center;
            font-size: 17px;
            font-weight: 700;
            font-style: italic;
            color: #0f172a;
            padding: 14px 10px;
            border-top: 2px solid #3b82f6;
            border-bottom: 1px solid #cbd5e1;
            margin: 12px 0 16px;
            line-height: 1.45;
        }

        .ic-row {
            display: flex;
            align-items: flex-start;
            gap: 11px;
            margin-bottom: 13px;
        }

        .ic-box {
            width: 32px;
            height: 32px;
            border-radius: 7px;
            background: #dbeafe;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .ic-row h4 {
            font-size: 13.5px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 1px;
        }

        .ic-row p {
            font-size: 11.5px;
            line-height: 1.5;
            color: #64748b;
            text-align: left;
            margin: 0;
        }

        .mod-item {
            margin-bottom: 11px;
        }

        .mod-item h4 {
            font-size: 13px;
            font-weight: 700;
            color: #0f172a;
        }

        .mod-item p {
            font-size: 11.5px;
            line-height: 1.5;
            color: #64748b;
            margin: 2px 0 0;
            text-align: left;
        }

        .step-row {
            display: flex;
            gap: 11px;
            margin-bottom: 14px;
            align-items: flex-start;
        }

        .step-n {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #3b82f6;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 13px;
            flex-shrink: 0;
        }

        .step-row h4 {
            font-size: 13px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 2px;
        }

        .step-row p {
            font-size: 11.5px;
            color: #64748b;
            margin: 0;
            text-align: left;
            line-height: 1.5;
        }

        .hl-box {
            background: linear-gradient(135deg, #eff6ff, #dbeafe);
            border: 1px solid #bfdbfe;
            border-radius: 9px;
            padding: 16px 18px;
            margin-top: 8px;
        }

        .hl-box h3 {
            font-size: 14px;
            font-weight: 700;
            color: #1e40af;
            margin-bottom: 10px;
        }

        .stat-r {
            display: flex;
            align-items: center;
            gap: 9px;
            margin-bottom: 8px;
        }

        .stat-r .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #3b82f6;
            flex-shrink: 0;
        }

        .stat-r p {
            font-size: 11.5px;
            color: #1e293b;
            margin: 0;
            text-align: left;
            font-weight: 500;
        }

        .ben-block {
            margin-bottom: 14px;
        }

        .ben-block h4 {
            font-size: 13.5px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 2px;
        }

        .ben-block p {
            font-size: 12px;
            text-align: left;
        }

        .con-off {
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        .con-off:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .con-off h4 {
            font-size: 13.5px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 3px;
        }

        .con-off p {
            font-size: 11.5px;
            color: #64748b;
            line-height: 1.6;
            margin: 0;
            text-align: left;
        }

        .cover-pg {
            background: linear-gradient(160deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            height: 100%;
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.5);
            /* Hardcover feeling */
        }

        .cover-pg h1 {
            font-size: 42px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 2px;
        }

        .cover-pg h1 span {
            color: #3b82f6;
        }

        .cover-pg .sub {
            color: #bfdbfe;
            font-size: 22px;
            letter-spacing: 1.5px;
            margin-top: 15px;
            line-height: 1.6;
            font-family: 'Playfair Display', Georgia, serif;
            font-style: italic;
        }

        .cover-pg .co {
            color: #94a3b8;
            font-size: 18px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 40px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
        }

        .cover-pg .yr {
            color: #64748b;
            font-size: 16px;
            margin-top: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .c-line {
            width: 60px;
            height: 2px;
            background: #3b82f6;
            margin: 18px auto;
        }

        .back-pg {
            background: linear-gradient(160deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 48px;
            height: 100%;
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.5);
        }

        .back-pg p {
            color: #bfdbfe;
            font-size: 24px;
            font-style: italic;
            line-height: 1.7;
            max-width: 350px;
            font-family: 'Playfair Display', Georgia, serif;
        }

        .back-pg .url {
            color: #3b82f6;
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-style: normal;
            margin-top: 30px;
            letter-spacing: 2px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .pg-num {
            position: absolute;
            bottom: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            color: #94a3b8;
        }

        .pg-num-l {
            left: 30px;
        }

        .pg-num-r {
            right: 30px;
        }

        .endpaper {
            background: linear-gradient(160deg, #0f172a, #1e293b);
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .endpaper-inner {
            text-align: center;
        }

        .endpaper-inner p {
            color: #475569;
            font-size: 13px;
        }

        #leftContent,
        #rightContent {
            width: 100%;
            height: 100%;
        }

        .speech-pg {
            padding: 40px 45px;
            height: 100%;
            overflow-y: hidden;
            color: #1e293b;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .speech-pg h2 {
            font-size: 36px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 24px;
            line-height: 1.35;
        }

        .speech-pg h3 {
            font-size: 26px;
            font-weight: 700;
            color: #3b82f6;
            margin-bottom: 14px;
            margin-top: 14px;
        }

        .speech-pg p {
            font-size: 20px;
            line-height: 1.9;
            text-align: justify;
            margin-bottom: 18px;
            color: #334155;
            letter-spacing: 0.2px;
        }

        .speech-pg .pull-q {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            font-style: italic;
            color: #0f172a;
            padding: 24px 18px;
            border-top: 2px solid #3b82f6;
            border-bottom: 1px solid #cbd5e1;
            margin: 30px 0;
            line-height: 1.5;
        }
    </style>
</head>

<body>

    <div class="book-scene">
        <div class="book" id="book">
            <!-- Static left half -->
            <div class="half half-left paper" id="halfLeft">
                <div id="leftContent">
                    <div class="endpaper">
                        <div class="endpaper-inner">
                            <div class="c-line"></div>
                            <p>ProtApp</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Static right half -->
            <div class="half half-right paper" id="halfRight">
                <div id="rightContent">
                    <!-- Cover -->
                    <div class="cover-pg" style="border-radius:0 8px 8px 0;">
                        <div style="width:50px;height:3px;background:#3b82f6;margin-bottom:30px;"></div>
                        <h1><span>Prot</span>App</h1>
                        <div class="c-line"></div>
                        <p class="sub">Yatırım, Satın Alma ve<br />Proje Takip Sistemi</p>
                        <p class="co">AnkaraBT</p>
                        <p class="yr">2025</p>
                    </div>
                </div>
            </div>

            <!-- Flip page element (reused for animation) -->
            <div class="flip-page" id="flipPage" style="display:none;">
                <div class="flip-front paper" id="flipFront"></div>
                <div class="flip-back paper" id="flipBack"></div>
            </div>

            <!-- Spine -->
            <div class="spine"></div>
        </div>
        <div class="book-shadow"></div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <button id="prevBtn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="m15 18-6-6 6-6" />
            </svg>
        </button>
        <span id="pageCounter">Sayfa 1 – 2 / 16</span>
        <button id="nextBtn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="m9 18 6-6-6-6" />
            </svg>
        </button>
    </div>

    <script>
        // ═══════════════════════════════════════════════
        // All 16 page contents (Turkish translation)
        // ═══════════════════════════════════════════════
        const pages = [];

        // Page 0 (Left): Cover
        pages[0] = `<div class="cover-pg" style="border-radius:16px 4px 4px 16px;">
      <div style="width:50px;height:3px;background:#3b82f6;margin-bottom:30px;"></div>
      <h1><span>Prot</span>App</h1>
      <div class="c-line"></div>
      <p class="sub">Yatırım, Satın Alma ve<br/>Proje Takip Sistemi</p>
      <p class="co">AnkaraBT</p>
      <p class="yr">2025</p>
    </div>`;

        // Page 1 (Right): Speech 1
        pages[1] = `<div class="speech-pg">
      <h2>Hanımefendiler ve beyefendiler,</h2>
      <p>Günümüz dünyasında, büyük ölçekli projeleri yönetmek artık sadece hesap çizelgeleri ve kağıt izlerinden ibaret değildir. Kamu veya özel kuruluşlar büyüyen karmaşıklıkla karşı karşıyadır: çok sayıda yüklenici, kısıtlı bütçeler, yasal gereklilikler ve zamanında sonuç alma baskısı.</p>
      <p>Soru şudur: Her şeyi nasıl tek bir yerden, tam görünürlükle kontrol altında tutarsınız?</p>
      <div class="pull-q">Cevap ProtApp.</div>
      <span class="pg-num pg-num-r">2</span>
    </div>`;

        // Page 2 (Left): Speech 2
        pages[2] = `<div class="speech-pg">
      <p>ProtApp, AnkaraBT tarafından geliştirilen kapsamlı, web tabanlı bir Yatırım, Satın Alma ve Proje Takip Sistemidir. Özellikle bütçe teklifinden nihai teslimat ve arşivlemeye kadar projelerinin tüm yaşam döngüsünü yönetmesi gereken kurumlar için, bir düzine farklı araç arasında geçiş yapmadan tasarlanmıştır.</p>
      <p>ProtApp'i neyin farklı kıldığını size anlatayım.</p>
      <span class="pg-num pg-num-l">3</span>
    </div>`;

        // Page 3 (Right): Speech 3
        pages[3] = `<div class="speech-pg">
      <h3>Birincisi: tamamen merkezidir.</h3>
      <p>Her paydaş — proje yöneticileri, satın alma görevlileri, saha mühendisleri, finansal kontrolörler — hepsi tek bir platformda çalışır. Yinelenen veri yok. İletişim kopukluğu yok. Versiyon karışıklığı yok. Tek sistem. Tek gerçek kaynak.</p>
      <h3>İkincisi: akıllı ve rol tabanlıdır.</h3>
      <p>Herkesin her şeye erişmesi gerekmez. ProtApp akıllı bir yetkilendirme modeli kullanır; bu, her kullanıcının yalnızca kendi rolüyle ilgili modülleri ve verileri görmesi anlamına gelir. Bu, bilgileri güvende, operasyonları temiz ve hesap verebilirliği net tutar.</p>
      <span class="pg-num pg-num-r">4</span>
    </div>`;

        // Page 4 (Left): Speech 4
        pages[4] = `<div class="speech-pg">
      <h3>Üçüncüsü: tüm proje yolculuğunu kapsar.</h3>

        // ═══════════════════════════════════════════════
        // Spread logic: each spread = [leftPageIndex, rightPageIndex]
        // ═══════════════════════════════════════════════
        const spreads = [
            [0, 1],    // Spread 0
            [2, 3],    // Spread 1
            [4, 5],    // Spread 2
            [6, 7],    // Spread 3
            [8, 9],    // Spread 4
            [10, 11],  // Spread 5
            [12, 13],  // Spread 6
            [14, 15],  // Spread 7
        ];

        let currentSpread = 0;
        let isAnimating = false;

        const leftContent = document.getElementById('leftContent');
        const rightContent = document.getElementById('rightContent');
        const halfLeft = document.getElementById('halfLeft');
        const halfRight = document.getElementById('halfRight');
        const flipPage = document.getElementById('flipPage');
        const flipFront = document.getElementById('flipFront');
        const flipBack = document.getElementById('flipBack');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pageCounter = document.getElementById('pageCounter');

        function setSpread(idx) {
            leftContent.innerHTML = pages[spreads[idx][0]];
            rightContent.innerHTML = pages[spreads[idx][1]];
        }

        function updateCounter() {
            const s = spreads[currentSpread];
            const left = s[0] + 1;
            const right = s[1] + 1;
            pageCounter.textContent = `Sayfa ${left} – ${right} / 16`;

            prevBtn.disabled = currentSpread === 0;
            nextBtn.disabled = currentSpread === spreads.length - 1;
        }

        function goNext() {
            if (isAnimating || currentSpread >= spreads.length - 1) return;
            isAnimating = true;

            const nextSpreadIdx = currentSpread + 1;

            // Setup flip page: front shows current right page, back shows next left page
            flipFront.innerHTML = pages[spreads[currentSpread][1]];
            flipBack.innerHTML = pages[spreads[nextSpreadIdx][0]];

            // Show the right page content underneath (next spread's right page)
            rightContent.innerHTML = pages[spreads[nextSpreadIdx][1]];

            // Show flip page
            flipPage.style.display = 'block';
            flipPage.classList.remove('flipping-backward');
            flipPage.classList.add('flipping-forward');

            // After animation completes
            setTimeout(() => {
                flipPage.style.display = 'none';
                flipPage.classList.remove('flipping-forward');

                currentSpread = nextSpreadIdx;
                setSpread(currentSpread);
                updateCounter();
                isAnimating = false;
            }, 720);
        }

        function goPrev() {
            if (isAnimating || currentSpread <= 0) return;
            isAnimating = true;

            const prevSpreadIdx = currentSpread - 1;

            // Setup flip page: it starts flipped (as the current left page) and unflips to reveal the prev right page
            flipBack.innerHTML = pages[spreads[currentSpread][0]];
            flipFront.innerHTML = pages[spreads[prevSpreadIdx][1]];

            // Show the left content underneath (previous spread's left page)
            leftContent.innerHTML = pages[spreads[prevSpreadIdx][0]];

            // Show flip page — starts at -180deg and goes to 0
            flipPage.style.display = 'block';
            flipPage.classList.remove('flipping-forward');
            flipPage.classList.add('flipping-backward');

            setTimeout(() => {
                flipPage.style.display = 'none';
                flipPage.classList.remove('flipping-backward');

                currentSpread = prevSpreadIdx;
                setSpread(currentSpread);
                updateCounter();
                isAnimating = false;
            }, 720);
        }

        // Button handlers
        nextBtn.addEventListener('click', goNext);
        prevBtn.addEventListener('click', goPrev);

        // Keyboard
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
            if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
        });

        // Click on book halves
        document.getElementById('book').addEventListener('click', (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const x = e.clientX - rect.left;
            if (x > rect.width / 2) goNext();
            else goPrev();
        });

        // Initialize
        setSpread(0);
        updateCounter();
    </script>
